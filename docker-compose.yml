version: '3.9'

services:

  society-api:

    build: .

    container_name: society-api

    ports:
      - "8080:80"

    volumes:
      - ./api:/var/www/html

    depends_on:
      - mysql

  mysql:

    image: mysql:8.0

    container_name: society-mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: societyos

      MYSQL_USER: society

      MYSQL_PASSWORD: society123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: society-phpmyadmin

    restart: always

    environment:

      PMA_HOST: mysql

      MYSQL_ROOT_PASSWORD: root

    ports:
      - "8081:80"

volumes:

  mysql_data: